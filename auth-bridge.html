<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Sign-In</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #120b09;
        --panel: #241512;
        --line: rgba(255, 221, 168, 0.12);
        --text: #fff7ea;
        --muted: rgba(255, 239, 216, 0.74);
        --gold: #d7a44c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: var(--text);
        background:
          linear-gradient(180deg, rgba(10, 4, 2, 0.18), rgba(0, 0, 0, 0.86)),
          radial-gradient(circle at top, rgba(152, 36, 24, 0.34), transparent 26%),
          linear-gradient(180deg, #1a0f0c 0%, #120b09 18%, #100807 100%);
      }

      .card {
        width: min(420px, calc(100% - 32px));
        padding: 28px;
        border-radius: 18px;
        background: linear-gradient(180deg, rgba(45, 21, 17, 0.96), rgba(20, 11, 9, 0.98));
        border: 1px solid rgba(215, 164, 76, 0.16);
        text-align: center;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--gold);
        letter-spacing: 0.14em;
        text-transform: uppercase;
        font-size: 0.8rem;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.5;
      }

      #googleButton {
        display: flex;
        justify-content: center;
      }

      #status {
        margin-top: 16px;
        min-height: 22px;
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Step 1</p>
      <h1>Sign in with Google</h1>
      <p>Choose your Google account, then this window will close and unlock the password step.</p>
      <div id="googleButton"></div>
      <div id="status">Loading Google sign-in...</div>
    </main>
    <script>
      const DEFAULT_CLIENT_ID = "419869093852-vhu7cc7rkjpcfpgvjkt6iehl0qdaosrt.apps.googleusercontent.com";
      const params = new URLSearchParams(window.location.search);
      const clientId = params.get("client_id") || DEFAULT_CLIENT_ID;
      const statusEl = document.getElementById("status");

      function sendCredential(credential) {
        if (!credential) {
          statusEl.textContent = "Google sign-in did not return a credential.";
          return;
        }
        try {
          window.opener?.postMessage(
            {
              type: "basement-google-credential",
              credential,
            },
            "*"
          );
          statusEl.textContent = "Signed in. Returning to the app...";
          window.setTimeout(() => window.close(), 300);
        } catch (error) {
          statusEl.textContent = error?.message || "Could not return to the app.";
        }
      }

      function renderGoogleButton() {
        if (!window.google?.accounts?.id) {
          window.setTimeout(renderGoogleButton, 250);
          return;
        }
        window.google.accounts.id.initialize({
          client_id: clientId,
          callback: ({ credential }) => sendCredential(credential),
          auto_select: false,
          cancel_on_tap_outside: true,
        });
        window.google.accounts.id.renderButton(document.getElementById("googleButton"), {
          theme: "outline",
          size: "large",
          text: "signin_with",
          shape: "rectangular",
          width: 280,
        });
        statusEl.textContent = "Ready.";
      }

      renderGoogleButton();
    </script>
  </body>
</html>
