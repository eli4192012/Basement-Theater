<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Shrek the Third Cover</title>
  <desc id="desc">A bright green and sky blue poster-style cover inspired by Shrek the Third.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#66d1ff"/>
      <stop offset="100%" stop-color="#d8f7ff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#8dc84b"/>
      <stop offset="100%" stop-color="#4a8626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#173a14" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="800" height="1200" fill="url(#sky)"/>
  <rect y="860" width="800" height="340" fill="url(#ground)"/>

  <g filter="url(#shadow)">
    <ellipse cx="400" cy="980" rx="250" ry="56" fill="#6aa53d" opacity="0.45"/>

    <ellipse cx="400" cy="245" rx="180" ry="140" fill="#88cf4b"/>
    <path d="M290 150 C235 55 165 25 118 76 C85 112 98 169 150 196 C200 222 264 208 290 150 Z" fill="#88cf4b"/>
    <path d="M510 150 C565 55 635 25 682 76 C715 112 702 169 650 196 C600 222 536 208 510 150 Z" fill="#88cf4b"/>
    <ellipse cx="322" cy="235" rx="54" ry="68" fill="#fff"/>
    <ellipse cx="478" cy="235" rx="54" ry="68" fill="#fff"/>
    <circle cx="338" cy="246" r="26" fill="#603d1b"/>
    <circle cx="462" cy="246" r="26" fill="#603d1b"/>
    <circle cx="346" cy="236" r="8" fill="#fff"/>
    <circle cx="470" cy="236" r="8" fill="#fff"/>
    <path d="M335 335 C375 368 425 368 465 335" fill="none" stroke="#5a3410" stroke-width="15" stroke-linecap="round"/>

    <rect x="290" y="390" width="220" height="250" rx="48" fill="#7b52a3"/>
    <path d="M290 470 C352 445 448 445 510 470 L510 540 C448 565 352 565 290 540 Z" fill="#d8bc8a"/>
    <rect x="364" y="390" width="72" height="250" fill="#f0d59a"/>
    <path d="M305 640 L250 895" stroke="#88cf4b" stroke-width="36" stroke-linecap="round"/>
    <path d="M495 640 L550 895" stroke="#88cf4b" stroke-width="36" stroke-linecap="round"/>
    <path d="M290 470 L170 680" stroke="#88cf4b" stroke-width="34" stroke-linecap="round"/>
    <path d="M510 470 L630 680" stroke="#88cf4b" stroke-width="34" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)" transform="translate(110 520)">
    <ellipse cx="0" cy="210" rx="88" ry="52" fill="#aab5c1"/>
    <ellipse cx="-32" cy="102" rx="70" ry="110" fill="#aab5c1"/>
    <ellipse cx="-14" cy="44" rx="42" ry="36" fill="#aab5c1"/>
    <ellipse cx="-54" cy="18" rx="14" ry="34" fill="#d7dde4"/>
    <ellipse cx="22" cy="18" rx="14" ry="34" fill="#d7dde4"/>
  </g>

  <g filter="url(#shadow)" transform="translate(675 560)">
    <ellipse cx="0" cy="190" rx="76" ry="40" fill="#c6b3a0"/>
    <rect x="-20" y="40" width="40" height="160" rx="18" fill="#c6b3a0"/>
    <ellipse cx="0" cy="18" rx="46" ry="54" fill="#c6b3a0"/>
    <ellipse cx="-28" cy="-10" rx="14" ry="44" fill="#d8c9b6"/>
    <ellipse cx="28" cy="-10" rx="14" ry="44" fill="#d8c9b6"/>
  </g>

  <g text-anchor="middle" filter="url(#shadow)">
    <text x="400" y="108" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">HE'S IN FOR THE ROYAL TREATMENT</text>
    <text x="400" y="1105" fill="#2c7a1d" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900">SHREK</text>
    <text x="400" y="1168" fill="#5a3e13" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">THE THIRD</text>
  </g>
</svg>
