<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">SpongeBob SquarePants Cover</title>
  <desc id="desc">A bright blue and yellow poster-style cover for SpongeBob SquarePants.</desc>
  <defs>
    <linearGradient id="ocean" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#1db7ff"/>
      <stop offset="55%" stop-color="#1274d9"/>
      <stop offset="100%" stop-color="#0a3d91"/>
    </linearGradient>
    <linearGradient id="sand" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffe49b"/>
      <stop offset="100%" stop-color="#f1bc54"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#06265e" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="800" height="1200" fill="url(#ocean)"/>
