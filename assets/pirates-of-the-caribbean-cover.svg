<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Pirates of the Caribbean Cover</title>
  <desc id="desc">A warm sepia poster-style cover inspired by Pirates of the Caribbean.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#5a1d11"/>
      <stop offset="45%" stop-color="#8e3a17"/>
      <stop offset="100%" stop-color="#1a0e0b"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4d1e14"/>
      <stop offset="100%" stop-color="#120807"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="800" height="1200" fill="url(#sky)"/>
